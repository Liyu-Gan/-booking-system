<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CD/CPL 预约系统（云端同步版）</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; background: #f8f9fa; }
        .container { max-width: 1200px; margin: 0 auto; }
        .time-bar { height: 60px; background: #28a745; border-radius: 4px; position: relative; overflow: hidden; }
        .booked-block { position: absolute; height: 100%; background: #dc3545; color: white; font-size: 12px; padding: 5px; }
        .time-ticks { display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-top: 8px; }
        .booked-item { padding: 10px; background: #f8f9fa; border-left: 4px solid #dc3545; margin: 5px 0; display: flex; justify-content: space-between; }
        .stat-item { padding: 10px; background: #e9f7fe; border-left: 4px solid #17a2b8; margin: 5px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">CD / CPL 测试预约系统（云端同步）</h1>

        <div class="mb-3">
            <button class="btn btn-primary me-2" onclick="switchSystem('cd')">CD 系统</button>
            <button class="btn btn-secondary" onclick="switchSystem('cpl')">CPL 系统</button>
        </div>

        <div class="bg-white p-3 rounded shadow-sm mb-3">
            <div class="row mb-2">
                <div class="col-md-4">
                    <label>日期</label>
                    <input type="date" id="date" class="form-control">
                </div>
            </div>
            <div class="row mb-2">
                <div class="col-md-3">
                    <label>起始时间</label>
                    <input type="number" id="h1" placeholder="时" min=0 max=23 class="form-control">
                </div>
                <div class="col-md-3">
                    <label></label>
                    <input type="number" id="m1" placeholder="分" min=0 max=59 class="form-control">
                </div>
                <div class="col-md-3">
                    <label>结束时间</label>
                    <input type="number" id="h2" placeholder="时" min=0 max=23 class="form-control">
                </div>
                <div class="col-md-3">
                    <label></label>
                    <input type="number" id="m2" placeholder="分" min=0 max=59 class="form-control">
                </div>
            </div>
            <div class="mb-2">
                <label>预约人</label>
                <input type="text" id="name" class="form-control" placeholder="输入姓名">
            </div>
            <button class="btn btn-primary" onclick="book()">确认预约</button>
            <button class="btn btn-outline-secondary ms-2" onclick="reset()">重置</button>
            <div id="msg" class="mt-2"></div>
        </div>

        <div class="bg-white p-3 rounded shadow-sm mb-3">
            <h5>24小时预约状态</h5>
            <div class="time-bar" id="bar"></div>
            <div class="time-ticks" id="ticks"></div>
        </div>

        <div class="bg-white p-3 rounded shadow-sm mb-3">
            <h5>已预约列表</h5>
            <div id="list"></div>
        </div>
    </div>

<script>
// ======================================
// 云端存储配置（JSONBIN —— 非谷歌、国内可用）
// ======================================
const CONFIG = {
  BIN_ID: "67f5c026acd6a4431d756297",
  API_KEY: "$2a$10$U1fE5m5epeQp5k5e5e5e5e5e5e5e5e",
};

let system = "cd";
const today = new Date().toISOString().split("T")[0];

// 初始化
window.onload = () => {
  document.getElementById("date").value = today;
  document.getElementById("h1").value = 9;
  document.getElementById("m1").value = 0;
  document.getElementById("h2").value = 10;
  document.getElementById("m2").value = 0;
  makeTicks();
  load();
};

// 切换系统 CD / CPL
function switchSystem(s) {
  system = s;
  showMsg(`已切换到 ${s.toUpperCase()} 系统`, "info");
  load();
}

// 生成时间刻度
function makeTicks() {
  let t = "";
  for (let i=0;i<=24;i++) t += `<div>${i}:00</div>`;
  document.getElementById("ticks").innerHTML = t;
}

// ======================================
// 云端读取
// ======================================
async function getCloud() {
  try {
    const r = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.BIN_ID}/latest`, {
      headers: { "X-Access-Key": CONFIG.API_KEY }
    });
    const d = await r.json();
    return d.record || { cd: {}, cpl: {} };
  } catch (e) {
    return { cd: {}, cpl: {} };
  }
}

// ======================================
// 云端保存
// ======================================
async function setCloud(data) {
  try {
    await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.BIN_ID}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "X-Access-Key": CONFIG.API_KEY
      },
      body: JSON.stringify(data)
    });
  } catch (e) {}
}

// ======================================
// 预约
// ======================================
async function book() {
  const date = document.getElementById("date").value;
  const h1 = +document.getElementById("h1").value;
  const m1 = +document.getElementById("m1").value;
  const h2 = +document.getElementById("h2").value;
  const m2 = +document.getElementById("m2").value;
  const name = document.getElementById("name").value.trim();

  if (!date || !name) { showMsg("请填写完整", "warning"); return; }
  const t1 = h1*60 + m1;
  const t2 = h2*60 + m2;
  if (t1 >= t2) { showMsg("结束时间必须更大", "danger"); return; }

  const data = await getCloud();
  const day = data[system][date] || {};

  // 冲突检查
  for (const k in day) {
    const [a, b] = k.split("-");
    const [sh, sm] = a.split(":").map(Number);
    const [eh, em] = b.split(":").map(Number);
    const st = sh*60+sm, et=eh*60+em;
    if (!(t2 <= st || t1 >= et)) {
      showMsg("时段冲突！", "danger");
      return;
    }
  }

  const key = `${h1.toString().padStart(2,0)}:${m1.toString().padStart(2,0)}-${h2.toString().padStart(2,0)}:${m2.toString().padStart(2,0)}`;
  if (!data[system][date]) data[system][date] = {};
  data[system][date][key] = name;

  await setCloud(data);
  showMsg("预约成功！已同步云端", "success");
  reset();
  load();
}

// ======================================
// 加载并渲染
// ======================================
async function load() {
  const date = document.getElementById("date").value;
  const data = await getCloud();
  const bookings = data[system][date] || {};

  // 列表
  let html = "";
  for (const k in bookings) {
    html += `
    <div class="booked-item">
      <div>${date} ${k} | ${bookings[k]}</div>
      <button class="btn btn-sm btn-danger" onclick="del('${k}')">取消</button>
    </div>`;
  }
  document.getElementById("list").innerHTML = html || "<div class='text-muted'>暂无预约</div>";

  // 时间条
  const bar = document.getElementById("bar");
  bar.innerHTML = "";
  for (const k in bookings) {
    const [s, e] = k.split("-");
    const [sh, sm] = s.split(":").map(Number);
    const [eh, em] = e.split(":").map(Number);
    const st = sh*60+sm, et=eh*60+em;
    const left = (st / 1440) * 100;
    const width = ((et - st) / 1440) * 100;
    const div = document.createElement("div");
    div.className = "booked-block";
    div.style.left = left + "%";
    div.style.width = width + "%";
    div.innerText = k + " " + bookings[k];
    bar.appendChild(div);
  }
}

// ======================================
// 删除预约
// ======================================
async function del(key) {
  if (!confirm("确定取消？")) return;
  const date = document.getElementById("date").value;
  const data = await getCloud();
  if (data[system][date] && data[system][date][key]) {
    delete data[system][date][key];
    await setCloud(data);
    showMsg("已取消", "success");
    load();
  }
}

// 工具
function reset() {
  document.getElementById("name").value = "";
  document.getElementById("msg").innerHTML = "";
}
function showMsg(text, type) {
  const m = document.getElementById("msg");
  m.innerHTML = `<div class="alert alert-${type}">${text}</div>`;
  setTimeout(() => m.innerHTML = "", 2000);
}
</script>
</body>
</html>
